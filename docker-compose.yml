version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ems_db
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/seeds/initial_data.sql:/docker-entrypoint-initdb.d/2-seeds.sql
    ports:
      - "3306:3306"

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file: backend/.env
    environment:
      - DATABASE_URL=mysql+pymysql://root:${DB_ROOT_PASSWORD:-root_password}@db/ems_db
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
