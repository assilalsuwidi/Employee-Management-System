server {
    listen 8080;
    
    # إخفاء إصدار Nginx لتقليل المعلومات المكشوفة
    server_tokens off;
    
    # حماية من هجمات Clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # حماية من MIME-sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # سياسة أمان المحتوى (CSP) - تأكد من أن الـ connect-src يسمح بروابط الـ API الخاصة بك
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://localhost:5000 http://127.0.0.1:5000 ws://localhost:5000;" always;
    
    # سياسة الصلاحيات (Permissions Policy)
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    
    # سياسات النطاق المشترك (Cross-Origin Policies)
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Cross-Origin-Embedder-Policy "unsafe-none" always; 
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        
        # منع التخزين المؤقت للصفحات الديناميكية / الرئيسية (Storable and Cacheable Content)
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
}
