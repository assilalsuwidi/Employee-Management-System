sonar.projectKey=project
sonar.projectName=Project Nashwan

# Set the base directory to the root of the project
sonar.sources=backend/app,frontend/src
sonar.sourceEncoding=UTF-8

# Python specific configuration
sonar.python.version=3.10

# JavaScript/React specific configuration
sonar.javascript.file.suffixes=.js,.jsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,frontend/public/**

# Server details
sonar.host.url=http://localhost:9000
